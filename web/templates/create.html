<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Company</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Company ESG DB</a>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h3 class="mb-4">Add New Company</h3>

            <form method="POST" action="/companies" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Company Name</label>
                    <input name="name" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">BIN</label>
                    <input name="bin" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Website</label>
                    <input name="website" class="form-control" placeholder="https://example.com">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input name="email" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">City</label>
                    <input name="city" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input name="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select name="category_id" class="form-select">
                        <option value="">Choose category</option>
                        {{ range .Categories }}
                        <option value="{{ .ID }}">{{ .Name }}</option>
                        {{ end }}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Address</label>
                    <input name="address" class="form-control">
                </div>

                <div class="col-12 mt-3">
                    <h5>Procurement Department</h5>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Method</label>
                    <input name="procurement_method" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input name="procurement_email" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input name="procurement_phone" class="form-control">
                </div>

                <div class="col-12 mt-3">
                    <h5>HR Department</h5>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Responsible Person</label>
                    <input name="hr_name" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input name="hr_email" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input name="hr_phone" class="form-control">
                </div>

                <div class="col-12 mt-3">
                    <h5>ESG Department</h5>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Responsible Person</label>
                    <input name="esg_name" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input name="esg_email" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input name="esg_phone" class="form-control">
                </div>

                <div class="col-md-8">
                    <label class="form-label">ESG Report URL</label>
                    <input name="esg_report_url" class="form-control">
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" name="has_esg" id="hasEsgCheck">
                        <label class="form-check-label" for="hasEsgCheck">Has ESG Department</label>
                    </div>
                </div>

                <div class="col-12 mt-4 d-flex gap-2">
                    <button class="btn btn-primary">Save Company</button>
                    <a href="/" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
